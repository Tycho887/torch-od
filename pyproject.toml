[tool.poetry]
name = "diffod"
version = "0.1.0"
description = "A differentiable orbit determination library"
authors = ["michael <michaelrj03@gmail.com>"]
readme = "README.md"

[tool.poetry.dependencies]
python = ">=3.12,<3.15"
# Link the torch dependency to the specific source defined below
torch = { version = "^2.5.1", source = "pytorch_cpu" }
dsgp4 = "^1.1.5"

# Define the source for CPU-only wheels
[[tool.poetry.source]]
name = "pytorch_cpu"
url = "https://download.pytorch.org/whl/cpu"
priority = "explicit"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"